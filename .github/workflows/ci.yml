name: anomaly-agent-ci

# DevOps spirit: every push runs tests + a pipeline smoke test.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Unit tests (detector + parser)
        run: python -m pytest -q
      - name: Smoke test — incident must produce P1 (fail-on-p1)
        run: |
          set +e
          python -m src.pipeline --scenario incident --fail-on-p1
          code=$?
          # Expect exit code 1 (has P1) in the incident scenario.
          test $code -eq 1 && echo "OK: incident produced P1 as expected" || (echo "FAIL: incident produced no P1"; exit 1)
      - name: Smoke test — normal must NOT produce P1
        run: python -m src.pipeline --scenario normal --fail-on-p1
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anomaly-report
          path: sample_output/
